      - name: Deploy to AWS
        run: |
          aws s3 sync ./dist s3://company-prod-bucket --delete
          aws cloudfront create-invalidation --distribution-id E1234ABCD --paths "/*"

      - name: Send Slack notification
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"Deploy successful!"}' \
          https://hooks.slackwebhook.example.com/services/T0/B0/X

      - name: Debug info
        if: always()
        run: |
          echo "Database: $DATABASE_URL"
          env | grep -v PATH
